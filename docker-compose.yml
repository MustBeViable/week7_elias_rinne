services:
  db:
    image: mariadb:11
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: paskaroot
      MYSQL_DATABASE: calc_data
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    platform: linux/arm64
    build: .
    image: eliasrinne/sum-product_fx:latest
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: calc_data
      DB_USER: root
      DB_PASSWORD: paskaroot
      DISPLAY: host.docker.internal:0
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix

volumes:
  db_data: